<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SVGサイズ検証</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #FEFCF9; }
.grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin: 20px 0; }
.cell { text-align: center; }
.cell img { display: block; margin: 0 auto 8px; background: rgba(0,0,0,0.03); border: 1px dashed #ccc; }
.label { font-size: 12px; color: #666; }
h3 { color: #C83658; margin-top: 30px; }
</style>
</head>
<body>
<h2>新SVG（余白0%）のサイズ確認</h2>

<h3>32×32 px</h3>
<div class="grid">
  <div class="cell"><img src="tab-recipes.svg" width="32" height="32"><div class="label">レシピ</div></div>
  <div class="cell"><img src="tab-stock.svg" width="32" height="32"><div class="label">冷蔵庫</div></div>
  <div class="cell"><img src="tab-suggest.svg" width="32" height="32"><div class="label">献立</div></div>
  <div class="cell"><img src="tab-shopping.svg" width="32" height="32"><div class="label">買物</div></div>
  <div class="cell"><img src="tab-settings.svg" width="32" height="32"><div class="label">設定</div></div>
</div>

<h3>実際のボトムナビ風（32px）</h3>
<nav style="background: rgba(254, 252, 249, 0.97); border-top: 1px solid rgba(58,58,58,0.1); display: flex; justify-content: space-around; align-items: stretch; padding: 10px 0; border-radius: 10px; min-height: 68px;">
  <button style="background:transparent; border:none; flex:1; padding:6px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; opacity:1;">
    <span style="width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
      <img src="tab-recipes.svg" style="width:32px; height:32px; object-fit:contain;">
    </span>
    <span style="font-size:11px; color:#C83658; font-weight:500; line-height:1;">レシピ</span>
  </button>
  <button style="background:transparent; border:none; flex:1; padding:6px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; opacity:0.75;">
    <span style="width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
      <img src="tab-stock.svg" style="width:32px; height:32px; object-fit:contain;">
    </span>
    <span style="font-size:11px; line-height:1;">冷蔵庫</span>
  </button>
  <button style="background:transparent; border:none; flex:1; padding:6px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; opacity:0.75;">
    <span style="width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
      <img src="tab-suggest.svg" style="width:32px; height:32px; object-fit:contain;">
    </span>
    <span style="font-size:11px; line-height:1;">献立</span>
  </button>
  <button style="background:transparent; border:none; flex:1; padding:6px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; opacity:0.75;">
    <span style="width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
      <img src="tab-shopping.svg" style="width:32px; height:32px; object-fit:contain;">
    </span>
    <span style="font-size:11px; line-height:1;">買物</span>
  </button>
  <button style="background:transparent; border:none; flex:1; padding:6px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; opacity:0.75;">
    <span style="width:32px; height:32px; display:flex; align-items:center; justify-content:center;">
      <img src="tab-settings.svg" style="width:32px; height:32px; object-fit:contain;">
    </span>
    <span style="font-size:11px; line-height:1;">設定</span>
  </button>
</nav>
</body>
</html>
