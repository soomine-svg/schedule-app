<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111110;
    --surface: #1c1c1a;
    --border: #2a2a27;
    --text: #e8e6e0;
    --muted: #6b6960;
    --accent: #d4813a;
    --accent-dim: #7a4520;
    --ring-bg: #222220;
    --danger: #c45555;
    --success: #5a9e6b;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    padding: 32px 24px;
  }

  .label-top {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 400;
  }

  .ring-wrap {
    position: relative;
    width: 260px;
    height: 260px;
  }

  svg.ring {
    width: 260px;
    height: 260px;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--ring-bg);
    stroke-width: 10;
  }

  .ring-fill {
    fill: none;
    stroke: var(--accent);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.4s ease;
  }

  .ring-fill.done {
    stroke: var(--danger);
  }

  .ring-fill.paused {
    stroke: var(--muted);
  }

  .center-display {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time-main {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
    font-variant-numeric: tabular-nums;
    transition: color 0.4s;
  }

  .time-main.done { color: var(--danger); }

  .state-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-top: 6px;
    transition: background 0.3s;
  }
  .state-dot.running { background: var(--accent); animation: pulse 1.4s ease-in-out infinite; }
  .state-dot.done { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .presets {
    display: flex;
    gap: 8px;
  }

  .preset-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .preset-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .preset-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(212,129,58,0.08);
  }

  .custom-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .custom-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 4px;
    width: 70px;
    text-align: center;
    outline: none;
    transition: border-color 0.15s;
  }

  .custom-input:focus { border-color: var(--accent-dim); }

  .custom-set {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .custom-set:hover { border-color: var(--accent-dim); color: var(--accent); }

  .controls {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn-main {
    background: var(--accent);
    border: none;
    color: #111;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 12px 36px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 120px;
  }

  .btn-main:hover { background: #e89046; }
  .btn-main:active { transform: scale(0.97); }
  .btn-main.paused { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); }
  .btn-main.paused:hover { background: rgba(212,129,58,0.12); }

  .btn-reset {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 11px 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  .shortcuts {
    font-size: 10px;
    color: #3a3a38;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .kbd {
    display: inline-block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9px;
    color: #4a4a47;
  }

  .progress-bar-row {
    width: 260px;
    height: 2px;
    background: var(--ring-bg);
    border-radius: 1px;
    overflow: hidden;
    margin-top: -8px;
  }

  .progress-bar-inner {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.9s linear, background 0.4s;
    width: 100%;
  }

  .progress-bar-inner.done { background: var(--danger); }

  .finish-flash {
    display: none;
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: rgba(196,85,85,0.07);
    animation: flash 0.5s ease-out;
  }

  @keyframes flash {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<div class="finish-flash" id="flashEl"></div>

<div class="wrap">
  <span class="label-top">countdown</span>

  <div class="ring-wrap">
    <svg class="ring" viewBox="0 0 260 260">
      <circle class="ring-track" cx="130" cy="130" r="115"/>
      <circle class="ring-fill" id="ringFill" cx="130" cy="130" r="115"/>
    </svg>
    <div class="center-display">
      <div class="time-main" id="timeDisplay">25:00</div>
      <div class="state-dot" id="stateDot"></div>
    </div>
  </div>

  <div class="presets">
    <button class="preset-btn active" data-min="5">5</button>
    <button class="preset-btn active" data-min="10">10</button>
    <button class="preset-btn" data-min="15">15</button>
    <button class="preset-btn active" data-min="25">25</button>
    <button class="preset-btn" data-min="45">45</button>
    <button class="preset-btn" data-min="60">60</button>
  </div>

  <div class="custom-row">
    <input class="custom-input" id="customInput" type="number" min="1" max="180" placeholder="分" />
    <button class="custom-set" id="customSet">set</button>
  </div>

  <div class="controls">
    <button class="btn-reset" id="btnReset">reset</button>
    <button class="btn-main" id="btnStart">start</button>
  </div>

  <div class="shortcuts">
    <span class="kbd">space</span> start / pause &nbsp;&nbsp;
    <span class="kbd">r</span> reset
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 115;
const ringFill = document.getElementById('ringFill');
const timeDisplay = document.getElementById('timeDisplay');
const stateDot = document.getElementById('stateDot');
const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');
const customInput = document.getElementById('customInput');
const customSet = document.getElementById('customSet');
const flashEl = document.getElementById('flashEl');
const presetBtns = document.querySelectorAll('.preset-btn');

ringFill.style.strokeDasharray = CIRCUMFERENCE;
ringFill.style.strokeDashoffset = 0;

let totalSeconds = 25 * 60;
let remaining = totalSeconds;
let running = false;
let interval = null;
let audioCtx = null;

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function updateRing(rem, total) {
  const pct = total > 0 ? rem / total : 1;
  const offset = CIRCUMFERENCE * (1 - pct);
  ringFill.style.strokeDashoffset = offset;
}

function setDisplay(rem, total) {
  timeDisplay.textContent = fmt(rem);
  updateRing(rem, total);
}

function setPreset(minutes) {
  stopTimer();
  totalSeconds = minutes * 60;
  remaining = totalSeconds;
  setDisplay(remaining, totalSeconds);
  ringFill.classList.remove('done', 'paused');
  timeDisplay.classList.remove('done');
  stateDot.className = 'state-dot';
  btnStart.textContent = 'start';
  btnStart.className = 'btn-main';
}

function startTimer() {
  if (remaining <= 0) { setPreset(totalSeconds / 60); return; }
  running = true;
  btnStart.textContent = 'pause';
  btnStart.className = 'btn-main';
  ringFill.classList.remove('paused');
  stateDot.className = 'state-dot running';
  interval = setInterval(() => {
    remaining--;
    setDisplay(remaining, totalSeconds);
    document.title = fmt(remaining) + ' — Timer';
    if (remaining <= 0) {
      clearInterval(interval);
      running = false;
      onDone();
    }
  }, 1000);
}

function pauseTimer() {
  clearInterval(interval);
  running = false;
  btnStart.textContent = 'resume';
  btnStart.className = 'btn-main paused';
  ringFill.classList.add('paused');
  stateDot.className = 'state-dot';
}

function stopTimer() {
  clearInterval(interval);
  running = false;
}

function resetTimer() {
  stopTimer();
  remaining = totalSeconds;
  setDisplay(remaining, totalSeconds);
  ringFill.classList.remove('done', 'paused');
  timeDisplay.classList.remove('done');
  stateDot.className = 'state-dot';
  btnStart.textContent = 'start';
  btnStart.className = 'btn-main';
  document.title = 'Timer';
}

function onDone() {
  ringFill.classList.add('done');
  timeDisplay.classList.add('done');
  stateDot.className = 'state-dot done';
  btnStart.textContent = 'restart';
  btnStart.className = 'btn-main';
  document.title = '✓ Done — Timer';
  flashScreen();
  playDone();
}

function flashScreen() {
  flashEl.style.display = 'block';
  flashEl.style.animation = 'none';
  requestAnimationFrame(() => {
    flashEl.style.animation = '';
    flashEl.style.display = 'block';
    setTimeout(() => { flashEl.style.display = 'none'; }, 600);
  });
}

function playDone() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = audioCtx;
    const times = [0, 0.3, 0.6];
    times.forEach((t, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = i === 2 ? 880 : 660;
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.25);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.3);
    });
  } catch(e) {}
}

btnStart.addEventListener('click', () => {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (remaining <= 0) { resetTimer(); startTimer(); return; }
  running ? pauseTimer() : startTimer();
});

btnReset.addEventListener('click', resetTimer);

presetBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    presetBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    setPreset(parseInt(btn.dataset.min));
  });
});

customSet.addEventListener('click', () => {
  const v = parseInt(customInput.value);
  if (v >= 1 && v <= 180) {
    presetBtns.forEach(b => b.classList.remove('active'));
    setPreset(v);
  }
});

customInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') customSet.click();
});

document.addEventListener('keydown', e => {
  if (e.target === customInput) return;
  if (e.code === 'Space') { e.preventDefault(); btnStart.click(); }
  if (e.key === 'r' || e.key === 'R') resetTimer();
});

setDisplay(remaining, totalSeconds);
presetBtns.forEach(b => b.classList.remove('active'));
document.querySelector('[data-min="25"]').classList.add('active');
</script>
</body>
</html>
